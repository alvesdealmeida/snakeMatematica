<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 Snake Matemático</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a1a;
    --panel: #10102a;
    --border: #2a2a5a;
    --green: #00ff88;
    --yellow: #ffe94d;
    --red: #ff4d6d;
    --blue: #4dc8ff;
    --purple: #c084fc;
    --orange: #ff9f43;
    --white: #f0f0ff;
    --dim: #6060a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 16px 10px;
    overflow-x: hidden;
  }

  /* Subtle star bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, #ffffff18, transparent),
      radial-gradient(1px 1px at 40% 70%, #ffffff10, transparent),
      radial-gradient(1px 1px at 70% 30%, #ffffff14, transparent),
      radial-gradient(1px 1px at 85% 80%, #ffffff10, transparent),
      radial-gradient(1px 1px at 55% 55%, #ffffff12, transparent);
    pointer-events: none;
    z-index: 0;
  }

  h1 {
    font-family: 'Press Start 2P', monospace;
    color: var(--green);
    font-size: clamp(11px, 2.8vw, 20px);
    text-align: center;
    margin: 0 0 4px;
    text-shadow: 0 0 20px var(--green), 0 0 50px #00ff8840;
    letter-spacing: 2px;
    position: relative;
    z-index: 1;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 20px var(--green), 0 0 50px #00ff8840; }
    50%       { text-shadow: 0 0 30px var(--green), 0 0 80px #00ff8870; }
  }

  .subtitle {
    color: var(--dim);
    font-size: 13px;
    margin-bottom: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    position: relative;
    z-index: 1;
  }

  .game-wrapper {
    display: flex;
    gap: 18px;
    align-items: flex-start;
    width: 100%;
    max-width: 820px;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  /* ── Side Panel ── */
  .side-panel {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 16px 14px;
    min-width: 155px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex-shrink: 0;
  }

  .stat-box { text-align: center; }
  .stat-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'Press Start 2P', monospace;
    font-size: 18px;
    color: var(--yellow);
    text-shadow: 0 0 12px var(--yellow);
  }

  .lives-display {
    display: flex;
    justify-content: center;
    gap: 4px;
    font-size: 20px;
  }

  .level-badge {
    background: linear-gradient(135deg, #1a1a4a, #2a1a5a);
    border: 2px solid var(--purple);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }
  .level-badge .label { font-size: 9px; color: var(--purple); font-weight: 900; letter-spacing: 2px; }
  .level-badge .name  { font-size: 14px; font-weight: 900; color: var(--white); margin-top: 2px; }

  .streak-bar {
    background: #1a1000;
    border: 2px solid #ff9f4360;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }
  .streak-label { font-size: 10px; color: var(--orange); font-weight: 900; letter-spacing: 1px; }
  .streak-value {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    color: var(--orange);
    text-shadow: 0 0 10px var(--orange);
  }

  .controls-hint {
    font-size: 10px;
    color: var(--dim);
    line-height: 1.8;
    text-align: center;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .controls-hint kbd {
    background: var(--border);
    color: var(--white);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 9px;
    font-family: monospace;
  }

  /* ── Center area ── */
  .center-area {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
    max-width: 440px;
  }

  .question-bar {
    background: linear-gradient(135deg, #0d0d2e, #1a1a44);
    border: 2px solid var(--blue);
    border-radius: 12px;
    padding: 12px 18px;
    text-align: center;
    min-height: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 20px #4dc8ff20;
  }
  .question-label {
    font-size: 10px;
    color: var(--blue);
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 5px;
  }
  .question-text {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 3.5vw, 24px);
    color: var(--white);
    text-shadow: 0 0 18px var(--blue);
  }

  .canvas-container {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 40px #00ff8820, 0 0 80px #00ff8810;
    border: 3px solid var(--green);
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
    image-rendering: pixelated;
  }

  /* Feedback floating text */
  .feedback-text {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    position: absolute;
    top: 44%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.15s;
    text-shadow: 0 0 20px currentColor;
    white-space: nowrap;
  }

  /* ── Overlay ── */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(5, 5, 22, 0.93);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 10;
  }

  .overlay h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(11px, 2.8vw, 17px);
    text-align: center;
    line-height: 1.8;
  }
  .overlay p {
    color: var(--dim);
    font-size: 14px;
    text-align: center;
    max-width: 270px;
    line-height: 1.7;
  }

  .diff-btns {
    display: flex;
    flex-direction: column;
    gap: 9px;
    align-items: center;
  }

  .diff-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 12px 20px;
    border-radius: 10px;
    border: 2px solid transparent;
    cursor: pointer;
    width: 210px;
    text-align: center;
    line-height: 1.8;
    transition: all 0.15s;
  }
  .diff-easy   { background: #0d3320; color: var(--green);  border-color: var(--green); }
  .diff-easy:hover   { background: var(--green);  color: #000; transform: scale(1.04); }
  .diff-medium { background: #33280d; color: var(--yellow); border-color: var(--yellow); }
  .diff-medium:hover { background: var(--yellow); color: #000; transform: scale(1.04); }
  .diff-hard   { background: #330d18; color: var(--red);    border-color: var(--red); }
  .diff-hard:hover   { background: var(--red);    color: #fff; transform: scale(1.04); }

  .score-big {
    font-family: 'Press Start 2P', monospace;
    font-size: 28px;
    color: var(--yellow);
    text-shadow: 0 0 20px var(--yellow);
  }
  .score-sub { color: var(--dim); font-size: 12px; margin-top: 4px; }
  .score-record { color: var(--purple); font-size: 12px; margin-top: 6px; }

  /* ── Mobile bottom controls ── */
  .mobile-controls {
    display: none;
    margin-top: 14px;
    gap: 8px;
    flex-direction: column;
    align-items: center;
    z-index: 1;
  }
  .mc-row { display: flex; gap: 8px; }
  .mc-btn {
    width: 54px; height: 54px;
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s, transform 0.1s;
    color: var(--white);
  }
  .mc-btn:active { background: var(--border); transform: scale(0.94); }

  @media (max-width: 620px) {
    .side-panel { display: none; }
    .game-wrapper { flex-direction: column; align-items: center; }
    .mobile-controls { display: flex; }
    .center-area { max-width: 98vw; }
  }
</style>
</head>
<body>

<h1>🐍 SNAKE MATEMÁTICO</h1>
<div class="subtitle">Come a resposta certa e cresça!</div>

<div class="game-wrapper">

  <!-- Painel lateral esquerdo -->
  <div class="side-panel">
    <div class="stat-box">
      <div class="stat-label">Pontos</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Recorde</div>
      <div class="stat-value" id="highscore" style="color:var(--purple);text-shadow:0 0 12px var(--purple)">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Vidas</div>
      <div class="lives-display" id="lives">❤️❤️❤️</div>
    </div>
    <div class="streak-bar">
      <div class="streak-label">🔥 SEQUÊNCIA</div>
      <div class="streak-value" id="streak">0</div>
    </div>
    <div class="level-badge">
      <div class="label">NÍVEL</div>
      <div class="name" id="level-name">—</div>
    </div>
    <div class="controls-hint">
      <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd><br>
      ou <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd><br><br>
      <kbd>P</kbd> Pausar<br>
      <kbd>R</kbd> Reiniciar
    </div>
  </div>

  <!-- Área central -->
  <div class="center-area">
    <div class="question-bar">
      <div class="question-label">🧮 QUANTO É?</div>
      <div class="question-text" id="question">—</div>
    </div>

    <div class="canvas-container">
      <canvas id="gameCanvas" width="440" height="396"></canvas>
      <div class="feedback-text" id="feedback"></div>

      <!-- Overlay de menu -->
      <div class="overlay" id="overlay">
        <h2 style="color:var(--green)">🐍 SNAKE<br>MATEMÁTICO</h2>
        <p>Come o número <strong style="color:var(--green)">correto</strong> e cresça!<br>Evite as respostas <strong style="color:var(--red)">erradas</strong>!</p>
        <div class="diff-btns">
          <button class="diff-btn diff-easy" onclick="startGame('easy')">
            😊 FÁCIL
            <br><span style="font-size:6px;opacity:.7">Adição e subtração até 20</span>
          </button>
          <button class="diff-btn diff-medium" onclick="startGame('medium')">
            🤓 MÉDIO
            <br><span style="font-size:6px;opacity:.7">Multiplicação e divisão até 100</span>
          </button>
          <button class="diff-btn diff-hard" onclick="startGame('hard')">
            🔥 DIFÍCIL
            <br><span style="font-size:6px;opacity:.7">Potências, raízes e porcentagem</span>
          </button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Controles mobile -->
<div class="mobile-controls" id="mobileControls">
  <div class="mc-row">
    <button class="mc-btn" id="btn-up">▲</button>
  </div>
  <div class="mc-row">
    <button class="mc-btn" id="btn-left">◀</button>
    <button class="mc-btn" id="btn-down">▼</button>
    <button class="mc-btn" id="btn-right">▶</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  CONFIGURAÇÃO
// ═══════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const COLS = 22, ROWS = 18;
const CW = canvas.width / COLS;
const CH = canvas.height / ROWS;

let snake, dir, nextDir, items, score, lives, streak;
let highscore = 0, currentQ, difficulty, paused, dead, animId;
let moveTimer = 0, moveInterval = 200, lastTime = null;

const COLORS = {
  easy:   { head: '#00ff88', body: '#00bb66', glow: '#00ff8870' },
  medium: { head: '#ffe94d', body: '#ccaa00', glow: '#ffe94d70' },
  hard:   { head: '#ff4d6d', body: '#cc1144', glow: '#ff4d6d70' },
};

const LEVEL_NAMES = { easy: '😊 FÁCIL', medium: '🤓 MÉDIO', hard: '🔥 DIFÍCIL' };

const ITEM_PALETTE = ['#4dc8ff','#ff9f43','#c084fc','#f472b6'];

// ═══════════════════════════════════════════
//  GERADOR DE QUESTÕES
// ═══════════════════════════════════════════
function generateQuestion(diff) {
  let a, b, op, answer, display;

  if (diff === 'easy') {
    op = Math.random() < 0.5 ? '+' : '-';
    a  = rand(2, 18);
    b  = op === '-' ? rand(1, a) : rand(1, 18);
    answer = op === '+' ? a + b : a - b;
    display = `${a} ${op} ${b}`;

  } else if (diff === 'medium') {
    const ops = ['+','-','×','÷'];
    op = ops[Math.floor(Math.random() * ops.length)];
    if (op === '×') {
      a = rand(2, 12); b = rand(2, 12);
      answer = a * b;
    } else if (op === '÷') {
      b = rand(2, 10); answer = rand(2, 10); a = b * answer;
    } else if (op === '+') {
      a = rand(15, 60); b = rand(15, 60); answer = a + b;
    } else {
      a = rand(25, 90); b = rand(1, a - 1); answer = a - b;
    }
    display = `${a} ${op} ${b}`;

  } else { // hard
    const types = ['pow2','pow3','sqrt','pct','expr'];
    const t = types[Math.floor(Math.random() * types.length)];
    if (t === 'pow2') {
      a = rand(2, 12); answer = a * a; display = `${a}²`;
    } else if (t === 'pow3') {
      a = rand(2, 6);  answer = a * a * a; display = `${a}³`;
    } else if (t === 'sqrt') {
      const opts = [4,9,16,25,36,49,64,81,100,121,144];
      a = opts[Math.floor(Math.random() * opts.length)];
      answer = Math.sqrt(a); display = `√${a}`;
    } else if (t === 'pct') {
      const pcts = [10,20,25,50];
      b = pcts[Math.floor(Math.random() * pcts.length)];
      a = [40,60,80,100,120,200][Math.floor(Math.random()*6)];
      answer = (a * b) / 100; display = `${b}% de ${a}`;
    } else {
      a = rand(2,9); b = rand(2,9); const c = rand(1,9);
      answer = a * b + c; display = `${a}×${b}+${c}`;
    }
  }
  return { display, answer: Math.round(answer) };
}

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function generateWrongAnswers(correct) {
  const set = new Set();
  let attempts = 0;
  while (set.size < 3 && attempts < 100) {
    attempts++;
    let off = rand(1, Math.max(8, Math.ceil(correct * 0.3)));
    if (Math.random() < 0.5) off = -off;
    const w = correct + off;
    if (w !== correct && w >= 0) set.add(w);
  }
  return [...set];
}

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function freeCell(exclude = []) {
  const occ = new Set([
    ...snake.map(s => `${s.x},${s.y}`),
    ...exclude.map(e => `${e.x},${e.y}`)
  ]);
  let cell, tries = 0;
  do {
    cell = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    tries++;
  } while (occ.has(`${cell.x},${cell.y}`) && tries < 300);
  return cell;
}

function spawnItems() {
  const q = generateQuestion(difficulty);
  currentQ = q;
  document.getElementById('question').textContent = q.display + ' = ?';
  const wrongs = generateWrongAnswers(q.answer);
  const all = [
    { val: q.answer, correct: true },
    ...wrongs.map(w => ({ val: w, correct: false }))
  ].sort(() => Math.random() - 0.5);
  items = [];
  all.forEach(a => {
    const pos = freeCell(items);
    items.push({ ...pos, val: a.val, correct: a.correct });
  });
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('highscore').textContent = highscore;
  document.getElementById('streak').textContent = streak;
  document.getElementById('lives').textContent =
    '❤️'.repeat(Math.max(0, lives)) + '🖤'.repeat(Math.max(0, 3 - lives));
}

// ═══════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════
function startGame(diff) {
  difficulty = diff;
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('level-name').textContent = LEVEL_NAMES[diff];

  snake   = [{ x:11, y:9 }, { x:10, y:9 }, { x:9, y:9 }];
  dir     = { x:1, y:0 };
  nextDir = { x:1, y:0 };
  score = 0; lives = 3; streak = 0;
  highscore = parseInt(localStorage.getItem('snakeHS_' + diff) || '0');
  paused = false; dead = false;
  moveInterval = diff === 'easy' ? 210 : diff === 'medium' ? 165 : 130;
  moveTimer = 0;
  updateUI();
  spawnItems();
  if (animId) cancelAnimationFrame(animId);
  lastTime = null;
  animId = requestAnimationFrame(loop);
}

function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = ts - lastTime;
  lastTime = ts;
  if (!paused && !dead) {
    moveTimer += dt;
    if (moveTimer >= moveInterval) {
      moveTimer = 0;
      update();
    }
  }
  draw();
  if (!dead) animId = requestAnimationFrame(loop);
}

function update() {
  dir = { ...nextDir };
  const head = {
    x: (snake[0].x + dir.x + COLS) % COLS,
    y: (snake[0].y + dir.y + ROWS) % ROWS
  };
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    loseLife(); return;
  }
  snake.unshift(head);

  const hit = items.findIndex(i => i.x === head.x && i.y === head.y);
  if (hit !== -1) {
    const item = items[hit];
    if (item.correct) {
      const mult = difficulty === 'easy' ? 1 : difficulty === 'medium' ? 2 : 3;
      const pts  = 10 * (streak + 1) * mult;
      score += pts;
      streak++;
      if (score > highscore) {
        highscore = score;
        localStorage.setItem('snakeHS_' + difficulty, highscore);
      }
      showFeedback('✓ +' + pts, '#00ff88');
      updateUI();
      spawnItems();
    } else {
      snake.pop();
      streak = 0;
      showFeedback('✗ ERRADO!', '#ff4d6d');
      updateUI();
      loseLife();
      return;
    }
  } else {
    snake.pop();
  }
}

function loseLife() {
  lives--;
  updateUI();
  if (lives <= 0) { gameOver(); return; }
  snake   = [{ x:11, y:9 }, { x:10, y:9 }, { x:9, y:9 }];
  dir     = { x:1, y:0 };
  nextDir = { x:1, y:0 };
  spawnItems();
}

function gameOver() {
  dead = true;
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.innerHTML = `
    <h2 style="color:var(--red)">💀 FIM DE JOGO!</h2>
    <div style="text-align:center">
      <div class="score-big">${score}</div>
      <div class="score-sub">pontos conquistados</div>
      <div class="score-record">🏆 Recorde: ${highscore}</div>
    </div>
    <div class="diff-btns">
      <button class="diff-btn diff-${difficulty}" onclick="startGame('${difficulty}')">🔄 JOGAR DE NOVO</button>
      <button class="diff-btn diff-medium" onclick="showMenu()">📋 ESCOLHER NÍVEL</button>
    </div>
  `;
}

function showMenu() {
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.innerHTML = `
    <h2 style="color:var(--green)">🐍 SNAKE<br>MATEMÁTICO</h2>
    <p>Come o número <strong style="color:var(--green)">correto</strong> e cresça!<br>Evite as respostas <strong style="color:var(--red)">erradas</strong>!</p>
    <div class="diff-btns">
      <button class="diff-btn diff-easy"   onclick="startGame('easy')">😊 FÁCIL<br><span style="font-size:6px;opacity:.7">Adição e subtração até 20</span></button>
      <button class="diff-btn diff-medium" onclick="startGame('medium')">🤓 MÉDIO<br><span style="font-size:6px;opacity:.7">Multiplicação e divisão até 100</span></button>
      <button class="diff-btn diff-hard"   onclick="startGame('hard')">🔥 DIFÍCIL<br><span style="font-size:6px;opacity:.7">Potências, raízes e porcentagem</span></button>
    </div>
  `;
}

let feedbackTimer = null;
function showFeedback(text, color) {
  const el = document.getElementById('feedback');
  el.textContent = text;
  el.style.color  = color;
  el.style.opacity = '1';
  if (feedbackTimer) clearTimeout(feedbackTimer);
  feedbackTimer = setTimeout(() => { el.style.opacity = '0'; }, 900);
}

// ═══════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════
function draw() {
  const c = COLORS[difficulty] || COLORS.easy;

  // BG
  ctx.fillStyle = '#08081a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid dots
  ctx.fillStyle = '#14143a';
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      ctx.beginPath();
      ctx.arc(x * CW + CW/2, y * CH + CH/2, 0.8, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Items
  if (items) {
    items.forEach((item, i) => {
      const color = item.correct ? '#00ff88' : ITEM_PALETTE[i % ITEM_PALETTE.length];
      const x = item.x * CW, y = item.y * CH;
      const pad = 3;
      const w = CW - pad*2, h = CH - pad*2;

      // Glow
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur  = item.correct ? 22 : 12;

      // Background
      ctx.fillStyle   = item.correct ? '#002a18' : '#111130';
      ctx.strokeStyle = color;
      ctx.lineWidth   = item.correct ? 2.5 : 1.8;
      ctx.beginPath();
      roundRect(ctx, x+pad, y+pad, w, h, 6);
      ctx.fill(); ctx.stroke();
      ctx.restore();

      // Number
      ctx.fillStyle   = color;
      const fs = Math.min(CW, CH) * (String(item.val).length > 3 ? 0.35 : 0.45);
      ctx.font        = `900 ${fs}px Nunito`;
      ctx.textAlign   = 'center';
      ctx.textBaseline= 'middle';
      ctx.fillText(item.val, x + CW/2, y + CH/2);
    });
  }

  // Snake body
  for (let i = snake.length - 1; i >= 0; i--) {
    const seg = snake[i];
    const isHead = i === 0;
    const px = seg.x * CW, py = seg.y * CH;
    const pad = isHead ? 1 : 2;
    const col = isHead ? c.head : c.body;

    ctx.save();
    ctx.shadowColor = col;
    ctx.shadowBlur  = isHead ? 18 : 6;
    ctx.fillStyle   = col;
    ctx.beginPath();
    roundRect(ctx, px+pad, py+pad, CW-pad*2, CH-pad*2, isHead ? 5 : 3);
    ctx.fill();
    ctx.restore();

    // Eyes
    if (isHead) {
      const ex = px + CW/2, ey = py + CH/2;
      // Whites
      ctx.fillStyle = '#000c';
      ctx.beginPath(); ctx.arc(ex-4, ey-2, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex+4, ey-2, 3, 0, Math.PI*2); ctx.fill();
      // Pupils
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(ex-3.5, ey-2.5, 1.3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex+4.5, ey-2.5, 1.3, 0, Math.PI*2); ctx.fill();
    }
  }

  // Pause overlay
  if (paused) {
    ctx.fillStyle = 'rgba(5,5,22,0.78)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle   = '#ffe94d';
    ctx.shadowColor = '#ffe94d';
    ctx.shadowBlur  = 20;
    ctx.font        = "bold 15px 'Press Start 2P'";
    ctx.textAlign   = 'center';
    ctx.textBaseline= 'middle';
    ctx.fillText('PAUSADO', canvas.width/2, canvas.height/2 - 14);
    ctx.shadowBlur  = 0;
    ctx.fillStyle   = '#6060a0';
    ctx.font        = '13px Nunito';
    ctx.fillText('Pressione P para continuar', canvas.width/2, canvas.height/2 + 16);
  }
}

// Polyfill roundRect para Safari antigo
function roundRect(ctx, x, y, w, h, r) {
  if (ctx.roundRect) {
    ctx.roundRect(x, y, w, h, r);
  } else {
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }
}

// ═══════════════════════════════════════════
//  CONTROLES — Teclado
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => {
  const blocked = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];
  if (blocked.includes(e.key)) e.preventDefault();

  if ((e.key === 'ArrowUp'    || e.key === 'w') && dir.y !== 1)  nextDir = { x:0, y:-1 };
  if ((e.key === 'ArrowDown'  || e.key === 's') && dir.y !== -1) nextDir = { x:0, y:1  };
  if ((e.key === 'ArrowLeft'  || e.key === 'a') && dir.x !== 1)  nextDir = { x:-1, y:0 };
  if ((e.key === 'ArrowRight' || e.key === 'd') && dir.x !== -1) nextDir = { x:1,  y:0 };
  if (e.key === 'p' || e.key === 'P') paused = !paused;
  if (e.key === 'r' || e.key === 'R') startGame(difficulty || 'easy');
});

// ═══════════════════════════════════════════
//  CONTROLES — Touch / swipe
// ═══════════════════════════════════════════
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });

canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx >  20 && dir.x !== -1) nextDir = { x:1,  y:0 };
    if (dx < -20 && dir.x !==  1) nextDir = { x:-1, y:0 };
  } else {
    if (dy >  20 && dir.y !== -1) nextDir = { x:0, y:1  };
    if (dy < -20 && dir.y !==  1) nextDir = { x:0, y:-1 };
  }
  touchStart = null;
}, { passive: true });

// Botões mobile
function bindMobileBtn(id, dx, dy) {
  const btn = document.getElementById(id);
  ['touchstart','mousedown'].forEach(evt => {
    btn.addEventListener(evt, e => {
      e.preventDefault();
      if (dir.x !== -dx || dir.y !== -dy) nextDir = { x:dx, y:dy };
    }, { passive: false });
  });
}
bindMobileBtn('btn-up',    0, -1);
bindMobileBtn('btn-down',  0,  1);
bindMobileBtn('btn-left', -1,  0);
bindMobileBtn('btn-right', 1,  0);
</script>
